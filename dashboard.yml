name: Publier le tableau de bord

# Régénère les graphiques et les publie sur GitHub Pages
on:
  # Tous les jours à 23h30 Paris (= 21h30 UTC l'été, 22h30 l'hiver — on prend 22h UTC)
  schedule:
    - cron: '0 22 * * *'

  # Quand la base data.sqlite est mise à jour par le workflow de collecte
  push:
    branches: [main]
    paths:
      - 'data.sqlite'

  # Manuel
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Évite les exécutions concurrentes
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances d'analyse
        run: pip install pandas matplotlib numpy

      - name: Générer les graphiques
        run: python analyze.py

      - name: Construire la page web (index.html)
        run: python build_dashboard.py

      - name: Uploader le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
